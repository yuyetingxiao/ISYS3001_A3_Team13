<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Inventory</ion-title>
    <!-- 【仅新增 右上角Help按钮】 -->
    <ion-buttons slot="end">
    <ion-button (click)="showHelp()" color="light">Help</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button (click)="showHelp()">
        <ion-icon name="help-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-searchbar (ionInput)="onSearch($event)"></ion-searchbar>

  <ion-segment [(ngModel)]="selectedFilter" (ionChange)="filterByStatus()">
    <ion-segment-button value="all">All</ion-segment-button>
    <ion-segment-button value="in-stock">In Stock</ion-segment-button>
    <ion-segment-button value="low-stock">Low</ion-segment-button>
    <ion-segment-button value="out-of-stock">Out</ion-segment-button>
  </ion-segment>

  <ion-list>
    <ion-item *ngFor="let item of filteredItems">
      <ion-icon [name]="getStatusIcon(item.stock_status)" [color]="getStatusColor(item.stock_status)" slot="start"></ion-icon>
      <ion-label>
        {{ item.item_name }}<br>
        {{ item.category }} | Price: {{ formatPrice(item.price) }} | Qty: {{ item.quantity }}
      </ion-label>

      <ion-button color="primary" (click)="startEdit(item)" slot="end">
        <ion-icon name="pencil-outline"></ion-icon>
        Edit
      </ion-button>

      <ion-button color="danger" (click)="deleteItem(item)" slot="end">
        <ion-icon name="trash-outline"></ion-icon>
        Delete
      </ion-button>
    </ion-item>
  </ion-list>


  <div *ngIf="showEditForm && editingItem" class="ion-padding">
    <ion-list>
      <ion-item><ion-label>Edit Item</ion-label></ion-item>
      <ion-item>
        <ion-label position="stacked">Item name</ion-label>
        <ion-input [(ngModel)]="editingItem.item_name" placeholder="Name"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="stacked">Category</ion-label>
        <ion-select [(ngModel)]="editingItem.category">
          <ion-select-option *ngFor="let c of Object.values(Category)" [value]="c">{{ c }}</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Quantity</ion-label>
        <ion-input type="number" [(ngModel)]="editingItem.quantity" placeholder="Qty"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Price</ion-label>
        <ion-input type="number" step="0.01" [(ngModel)]="editingItem.price" placeholder="Price"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Supplier</ion-label>
        <ion-input [(ngModel)]="editingItem.supplier_name" placeholder="Supplier"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Stock Status</ion-label>
        <ion-select [(ngModel)]="editingItem.stock_status">
          <ion-select-option *ngFor="let s of Object.values(StockStatus)" [value]="s">{{ s }}</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Featured</ion-label>
        <ion-select [(ngModel)]="editingItem.featured_item">
          <ion-select-option [value]="1">Yes</ion-select-option>
          <ion-select-option [value]="0">No</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Note</ion-label>
        <ion-textarea [(ngModel)]="editingItem.special_note" placeholder="Optional note"></ion-textarea>
      </ion-item>
    </ion-list>

    <ion-button expand="block" color="success" (click)="saveEdit()">Save</ion-button>
    <ion-button expand="block" color="medium" (click)="cancelEdit()">Cancel</ion-button>
  </div>
</ion-content>
